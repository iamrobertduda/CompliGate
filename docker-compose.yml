version: '3.8'

services:
  compligate:
    build:
      context: .
      dockerfile: Dockerfile
    image: compligate:latest
    container_name: compligate
    ports:
      - "8000:8000"
    restart: unless-stopped
    # Add basic security constraints
    security_opt:
      - no-new-privileges:true
    # Limit memory to contain any potential leaks, although our lifespan cleanup helps
    deploy:
      resources:
        limits:
          memory: 1G
    environment:
      # Optional: any necessary environment variables
      - TZ=UTC
